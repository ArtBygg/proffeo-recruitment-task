<div class="relative px-4 mb-4">
  <proffeo-input
    [formControl]="searchControl"
    [placeholder]="'placeholders.search-input' | translate"
    matIconName="search"
  ></proffeo-input>
</div>

<div class="w-full flex flex-col h-full">
  @for (user of filteredUsers(); track user?.id; let isLast = $last) {
    <div class="flex items-center">
      <div
        [ngClass]="isLast ? '' : 'border-b border-slate-300'"
        class="flex items-center w-full border-b border-black/10 py-1.5 bg-lightGray-50"
      >
        <proffeo-radio
          (click)="selectUser(user)"
          [value]="user?.id"
          [formControl]="userFormControl"
          name="radio"
          class="mr-2"
        ></proffeo-radio>
        <proffeo-avatar
          [user]="user"
          [size]="AvatarSize.EXTRA_SMALL"
          [borderType]="AvatarBorderType.IndustryAdmin"
        />
        <div class="flex flex-col ml-2 py-2 w-full truncate">
          <p>{{ user?.firstName }} {{ user?.lastName }}</p>
        </div>
      </div>
    </div>
  }
</div>
