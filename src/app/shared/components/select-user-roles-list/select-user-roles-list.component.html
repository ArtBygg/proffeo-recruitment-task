<div class="flex-grow h-full">
  <div class="flex items-center">
    <div class="w-full flex items-center border-b border-slate-300">
      <proffeo-checkbox
        [formControl]="selectAllControl"
        [label]="'placeholders.select-all' | translate"
      ></proffeo-checkbox>
    </div>
  </div>

  @for (role of originalUsersRoles(); track role?.id; let isLast = $last) {
    <div class="flex items-center">
      <div
        [ngClass]="isLast ? '' : 'border-b border-slate-300'"
        class="flex flex-column items-center w-full border-b border-black/10 bg-lightGray-50"
      >
        <proffeo-checkbox
          (valueChange)="selectRole($event, role())"
          [disabled]="roleControls?.get(role()?.id!)?.disabled"
          [formControl]="roleControls?.get(role()?.id)"
        ></proffeo-checkbox>

        <div class="flex flex-col ml-2 py-2 w-full truncate">
          <p>{{ role()?.roleId }}</p>
        </div>
      </div>
    </div>
  }
</div>
