<div class="relative flex w-full gap-3">
  <div class="relative z-10 flex-shrink-0">
    @if (user()) {
      <proffeo-avatar
        [user]="user()"
        [size]="pointAvatarSize()"
      ></proffeo-avatar>
    } @else {
      <div class="h-3 w-3 rounded-full border-2 border-white bg-accent shadow-sm"></div>
    }
  </div>

  <div
    [ngClass]="cardClass()"
    class="z-10 flex w-full flex-col gap-4 rounded-2xl border border-slate-200 bg-white p-4 shadow-[0_1px_3px_rgba(15,23,42,0.08)]"
  >
    <ng-content></ng-content>
  </div>
</div>
