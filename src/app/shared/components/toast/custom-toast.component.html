<div
  (click)="close()"
  [ngClass]="{
    'bg-green-500/25': type === 'success',
    'bg-sky-100': type === 'info',
    'bg-orange-500/25': type === 'warning',
    'bg-red-400/25': type === 'error'
  }"
  class="min-w-[200px] lg:min-w-[310px] lg:max-w-[350px] flex flex-col items-start cursor-pointer justify-start rounded-lg border border-black/10"
>
  <div class="w-full flex items-center gap-3 py-2 p-2">
    @switch (type) {
      @case ('success') {
        <mat-icon
          fontIcon="check_circle"
          class="text-green-600! material-symbols-filled"
        ></mat-icon>
      }
      @case ('info') {
        <mat-icon
          fontIcon="info"
          class="text-blue-600! material-symbols-filled"
        ></mat-icon>
      }
      @case ('warning') {
        <mat-icon
          fontIcon="warning"
          class="text-orange-500! material-symbols-filled"
        ></mat-icon>
      }
      @case ('error') {
        <mat-icon
          fontIcon="cancel"
          class="text-error! material-symbols-filled"
        ></mat-icon>
      }
    }

    <div class="h-full flex flex-col items-start justify-center">
      <h3 class="w-full text-[12px]! font-semibold text-slate-600 max-w-[250px]">{{ message }}</h3>
    </div>
  </div>

  <div class="w-full h-[4px] bg-gray-100">
    @switch (type) {
      @case ('success') {
        <div
          [style.width.%]="progressWidth()"
          class="h-full bg-green-600 rounded-bl-lg rounded-tr-lg"
        ></div>
      }
      @case ('info') {
        <div
          [style.width.%]="progressWidth()"
          class="h-full bg-blue-500 rounded-bl-lg rounded-tr-lg"
        ></div>
      }
      @case ('warning') {
        <div
          [style.width.%]="progressWidth()"
          class="h-full bg-orange-500 rounded-bl-lg rounded-tr-lg"
        ></div>
      }
      @case ('error') {
        <div
          [style.width.%]="progressWidth()"
          class="h-full bg-red-500 rounded-bl-lg rounded-tr-lg"
        ></div>
      }
    }
  </div>
</div>
