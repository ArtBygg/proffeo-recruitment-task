<form
  [formGroup]="form"
  autocomplete="off"
  class="no-swipe h-full w-full"
>
  <div class="flex flex-col w-full gap-2">
    <div class="flex w-full items-center gap-2">
      <input
        (click)="$event.stopPropagation()"
        [placeholder]="placeholder()"
        [maxlength]="maxLength()"
        matInput
        type="text"
        formControlName="text"
        class="flex-1 rounded border-2 border-slate-300/100 p-2 text-xl w-full h-[44px]"
      />
      <div class="flex items-center gap-2 shrink-0">
        <button
          (click)="save()"
          [disabled]="form.invalid"
          type="button"
          matTooltip="Save Changes"
          class="flex items-center justify-center w-6 h-6 rounded-md bg-proffeo-green hover-opacity"
        >
          <mat-icon
            fontIcon="check"
            class="text-white! icon-md"
          ></mat-icon>
        </button>

        <button
          (click)="cancel()"
          type="button"
          matTooltip="Cancel Changes"
          class="flex items-center justify-center w-6 h-6 rounded-md bg-proffeo-red hover-opacity"
        >
          <mat-icon
            fontIcon="close"
            class="text-white! icon-md"
          ></mat-icon>
        </button>
      </div>
    </div>
    @if (maxLength() !== undefined) {
      <div
        [class.text-gray-400]="!form.controls['text'].hasError('maxlength')"
        [class.text-red-500]="form.controls['text'].hasError('maxlength')"
        class="text-xs text-left transition-colors"
      >
        {{ form.controls['text'].value?.length || 0 }} / {{ maxLength() }}
      </div>
    }
  </div>
</form>
