@if (task() || createMode()) {
  <div
    [ngClass]="{ 'rounded-md border border-slate-200': createMode() }"
    class="relative flex w-full flex-col gap-3 bg-white"
  >
    <div class="flex min-h-0 w-full flex-col">
      <app-editor
        [showButtons]="false"
        [showMenu]="true"
        [minHeight]="isMobile() ? '0px' : minHeight()"
        [text]="task()?.description ?? ''"
        class="block h-auto min-h-0 w-full lg:h-full"
      />

      @if (contentChanged() && !createMode()) {
        <div class="sticky bottom-0 flex w-full bg-slate-100 px-4 py-2 shadow">
          <!-- Mobile layout -->
          <div class="flex w-full items-center justify-between gap-2 lg:hidden">
            <button
              (click)="revertDesc()"
              class="flex cursor-pointer items-center justify-center rounded-md bg-red-400 p-1 transition-all hover:scale-90"
            >
              <mat-icon class="text-white!">close</mat-icon>
            </button>
            <p class="font-medium text-slate-800">
              {{ 'project-tasks.details.description.unsaved-changes' | translate }}
            </p>
            <button
              (click)="updateDescription()"
              class="flex cursor-pointer items-center justify-center rounded-md bg-green-400 p-1 transition-all hover:scale-90"
            >
              <mat-icon class="text-white!">check</mat-icon>
            </button>
          </div>

          <!-- Desktop layout -->
          <div class="hidden w-full items-center justify-between gap-2 lg:flex">
            <p class="font-medium text-slate-800">
              {{ 'project-tasks.details.description.unsaved-changes' | translate }}
            </p>
            <div class="flex items-center justify-center gap-3">
              <button
                (click)="revertDesc()"
                class="flex cursor-pointer items-center justify-center rounded-md bg-red-400 p-1 transition-all hover:scale-90"
              >
                <mat-icon class="text-white!">close</mat-icon>
              </button>
              <button
                (click)="updateDescription()"
                class="flex cursor-pointer items-center justify-center rounded-md bg-green-400 p-1 transition-all hover:scale-90"
              >
                <mat-icon class="text-white!">check</mat-icon>
              </button>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
}
